<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приветствие | Proxy</title>
    <style>
        /* Обнуляем отступы и задаем современный шрифт */
        * {
            margin: 0;
            padding: 0;

            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Красивый мягкий градиент на фоне */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .container {
            background: rgba(255, 255, 255, 0.95); /* Полупрозрачный белый фон */
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem; /* Очень крупный текст */
            margin-bottom: 10px;
            color: #2d3436;
        }

        p {
            font-size: 1.1rem;
            color: #636e72;
            margin-bottom: 30px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            text-decoration: none;
            color: white;
            background: #6c5ce7;
            padding: 16px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            /* Чтобы текст не переносился странно */
            word-wrap: break-word;
        }

        /* Эффект при наведении */
        .btn:hover {
            background: #a29bfe;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4);
        }

        /* Эффект при нажатии */
        .btn:active {
            transform: translateY(0);
        }

        /* Второй цвет для разнообразия (опционально) */
        .btn-alt {
            background: #00b894;
        }
        .btn-alt:hover {
            background: #55efc4;
        }

        /* Адаптивность для маленьких экранов */
        @media (max-width: 480px) {
            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
